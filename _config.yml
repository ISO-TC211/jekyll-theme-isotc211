# Theme defaults — sites override these in their own _config.yml
title: "ISO/TC 211 Site"
title_html: "ISO/TC&nbsp;211"
brand_sub: "Geographic information/Geomatics"
description: "An ISO/TC 211 resource site"

email: open.source@ribose.com

markdown: kramdown

plugins:
  - jekyll/vite
  - jekyll-feed

collections:
  pages:
    output: true
    permalink: /:path/

committee:
  id: 211
  name: Geographic information/Geomatics

social:
  links: []

nav: []
footer_links: []

exclude:
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - node_modules
  - vendor
  - .sass-cache
  - vite.config.ts
  - postcss.config.js
  - bin
  - _frontend
  - config/vite.json
