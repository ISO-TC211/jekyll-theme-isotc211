name: release

on:
  workflow_dispatch:
    inputs:
      next_version:
        required: true
        default: 'skip'
  repository_dispatch:
    types: [do-release]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install gem-bump
        if: ${{ github.event.inputs.next_version != 'skip' && github.event.inputs.next_version != '' }}
        run: gem install gem-release

      - name: Bump version
        if: ${{ github.event.inputs.next_version != 'skip' && github.event.inputs.next_version != '' }}
        run: gem bump --version ${{ github.event.inputs.next_version }} --no-commit

      - name: Build gem
        run: gem build jekyll-theme-isotc211.gemspec

      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@v1

      - name: Publish to RubyGems
        run: gem push jekyll-theme-isotc211-*.gem

      - name: Tag and push
        if: ${{ github.event.inputs.next_version != 'skip' && github.event.inputs.next_version != '' }}
        run: |
          VERSION="${{ github.event.inputs.next_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jekyll-theme-isotc211.gemspec
          git commit -m "chore: bump version to ${VERSION}"
          git tag "v${VERSION}"
          git push origin main --tags
