name: release

on:
  workflow_dispatch:
    inputs:
      next_version:
        required: true
        default: 'skip'
  repository_dispatch:
    types: [do-release]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Bump version, tag, and push
        if: ${{ github.event.inputs.next_version != 'skip' && github.event.inputs.next_version != '' }}
        run: |
          gem install gem-release
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gem bump --version ${{ github.event.inputs.next_version }} --tag --push

      - name: Build gem
        run: gem build jekyll-theme-isotc211.gemspec

      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@v1

      - name: Publish to RubyGems
        run: gem push jekyll-theme-isotc211-*.gem
