<div class="site-brand-bar" aria-hidden="true"></div>
<header id="nav-header" class="site-header">
  <div class="site-header__inner">
    <a href="{{ '/' | relative_url }}" class="site-header__logo">
      <img src="{{ site.header_logo | default: '/assets/iso-red.svg' | relative_url }}" alt="ISO">
      <div class="site-header__brand">
        <span class="site-header__logo-text">{{ site.title_html | default: site.title }}</span>
        {% if site.brand_sub %}
        <span class="site-header__logo-sub">{{ site.brand_sub }}</span>
        {% endif %}
      </div>
    </a>

    <div class="site-header__actions">
      {% if site.nav %}
      <nav class="site-header__nav">
        {% for item in site.nav %}
        <a href="{{ item.url | relative_url }}" class="site-header__link">{{ item.title }}</a>
        {% endfor %}
      </nav>
      {% endif %}

      {% if site.committee and site.committee.home %}
      <a href="{{ site.committee.home }}" class="site-header__link" target="_blank" rel="noopener">
        Committee Site
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6m0 0v6m0-6L10 14"/></svg>
      </a>
      {% endif %}

      <button id="theme-toggle" type="button" class="site-header__icon-btn" aria-label="Toggle dark mode">
        {% include icons/sun.html %}
        {% include icons/moon.html %}
      </button>
    </div>
  </div>
</header>

<script>
  document.getElementById('theme-toggle').addEventListener('click', function() {
    if (window.__theme) window.__theme.toggle();
  });
</script>
