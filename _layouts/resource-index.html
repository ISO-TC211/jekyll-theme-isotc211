---
layout: base-page
bodyClass: resource-index
---

{{ content }}

<div class="resource-list">
  {% for resource in page.resources %}
  <a href="./{{ resource[0] }}" class="resource-list__item">
    <div class="resource-list__icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z"/>
      </svg>
    </div>
    <div class="resource-list__body">
      <h3 class="resource-list__title">ISO {{ resource[0] }}</h3>
      <span class="resource-list__label">{{ site.resource_listings[page.listing_key].resource_label | default: "resource" | capitalize }}</span>
    </div>
    <svg class="resource-list__chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
  </a>
  {% endfor %}
</div>
